name: Monitor Meta vehicle feed

on:
  workflow_dispatch:
  schedule:
    - cron: "35 */3 * * *"

jobs:
  check-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check feed freshness and match rate
        run: node scripts/check-feed-health.mjs
